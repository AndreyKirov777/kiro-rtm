version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=rmt_dev
      - POSTGRES_USER=rmt_user
      - POSTGRES_PASSWORD=rmt_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rmt_user -d rmt_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://rmt_user:rmt_password@postgres:5432/rmt_dev
      - JWT_SECRET=dev-secret-change-in-production
      - UPLOAD_DIR=./uploads
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend React app
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:4000
    command: npm start
    depends_on:
      - api

volumes:
  postgres_data:
